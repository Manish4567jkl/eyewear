<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison Vellora — Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..500;1,6..96,400..500&family=Space+Mono:wght@400;700&family=Archivo:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/view-transitions.css" />
    <style>
      #page {
        display: grid;
        grid-template-columns: 1fr clamp(480px, 34vw, 680px);
        width: 100vw;
        height: 100vh;
      }

      /* ---------- Stage (3D viewport + hero copy) ---------- */

      #stage {
        position: relative;
        grid-column: 1;
        grid-row: 1;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        display: block;
      }

      #brand {
        position: absolute;
        top: 36px;
        left: 44px;
        z-index: 5;
        font-family: "Playfair Display", serif;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--text);
        opacity: 0;
        user-select: none;
        text-decoration: none;
      }

      #stage .breadcrumb {
        position: absolute;
        top: 74px;
        left: 44px;
        padding: 0;
        z-index: 5;
        opacity: 0;
      }

      /* ---------- Configurator column ----------
         Restyled to the homepage/magazine design system (see src/styles/magazine.css):
         Bodoni Moda / Space Mono / Archivo, the oklch paper/ink/accent palette, sharp
         (non-rounded) rectangles for panel chrome, circular dots for material/color
         swatches with a ring box-shadow for the active state, and flat opacity/color
         transitions rather than the old brass-glow/scale-up treatment. Class names are
         unchanged — pdp.js builds this DOM — only the visual language changes here. */

      #controls {
        --mv-paper: oklch(0.97 0.01 85);
        --mv-ink: oklch(0.18 0.01 40);
        --mv-accent: oklch(0.4 0.16 25);

        grid-column: 2;
        grid-row: 1;
        height: 100vh;
        box-sizing: border-box;
        background-color: var(--mv-paper);
        border-left: 1px solid oklch(0.18 0.01 40 / 0.15);
        padding: 64px 56px 44px;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        font-family: "Archivo", sans-serif;
        color: var(--mv-ink);

        opacity: 0;
        transform: translateX(16px);
        transition: opacity 350ms var(--ease-out-expo), transform 350ms var(--ease-out-expo);
      }

      #controls.panel-visible {
        opacity: 1;
        transform: translateX(0);
      }

      .configurator-header {
        margin-bottom: 36px;
      }

      .configurator-eyebrow {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--mv-accent);
        margin-bottom: 10px;
      }

      .configurator-title {
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-size: clamp(28px, 3vw, 40px);
        line-height: 1.05;
        margin: 0;
        color: var(--mv-ink);
      }

      .backdrop-picker {
        margin-bottom: 44px;
      }

      .backdrop-picker-heading {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--mv-ink);
        opacity: 0.5;
        margin-bottom: 16px;
      }

      .backdrop-picker-row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }

      .backdrop-tile-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .backdrop-tile {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 0 0 1px oklch(0.18 0.01 40 / 0.2);
        opacity: 0.6;
        transition: opacity var(--dur-release) var(--ease-out-soft), box-shadow var(--dur-release) var(--ease-out-soft);
      }

      .backdrop-tile canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .backdrop-tile-wrap:hover .backdrop-tile {
        opacity: 0.85;
        transition-duration: var(--dur-snap);
        transition-timing-function: var(--ease-out-expo);
      }

      .backdrop-tile-wrap.active .backdrop-tile {
        opacity: 1;
        box-shadow: 0 0 0 2px var(--mv-paper), 0 0 0 3px var(--mv-accent);
      }

      .backdrop-tile-label {
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-size: 13px;
        color: var(--mv-ink);
        opacity: 0.5;
        text-align: center;
        max-width: 70px;
        transition: opacity var(--dur-release) var(--ease-out-soft), color var(--dur-release) var(--ease-out-soft);
      }

      .backdrop-tile-wrap:hover .backdrop-tile-label {
        opacity: 0.8;
      }

      .backdrop-tile-wrap.active .backdrop-tile-label {
        opacity: 1;
        color: var(--mv-accent);
      }

      .rail-tabs {
        display: flex;
        gap: 28px;
        flex-wrap: wrap;
        margin-bottom: 32px;
        position: relative;
      }

      .rail-tab {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--mv-ink);
        opacity: 0.45;
        background: none;
        border: none;
        border-bottom: 1px solid transparent;
        padding: 0 0 8px;
        cursor: pointer;
        position: relative;
        transition: opacity var(--dur-release) var(--ease-out-soft), color var(--dur-release) var(--ease-out-soft),
          border-color var(--dur-release) var(--ease-out-soft);
      }

      .rail-tab:hover {
        opacity: 0.75;
        transition-duration: var(--dur-snap);
        transition-timing-function: var(--ease-out-expo);
      }

      .rail-tab.active {
        opacity: 1;
        color: var(--mv-accent);
        border-bottom-color: var(--mv-accent);
      }

      /* The old system tweened a shared indicator's left/width to the active tab; the
         new system's tabs (see .mv-mode/.mv-product-tab) each carry their own
         border-bottom instead — kept in the DOM (pdp.js positions it) but not rendered. */
      .rail-tab-indicator {
        display: none;
      }

      .rail-heading {
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-size: 22px;
        color: var(--mv-ink);
        opacity: 0.9;
        margin-bottom: 24px;
        min-height: 28px;
      }

      .rail-filmstrip {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .rail-nav {
        flex: none;
        width: 24px;
        height: 130px;
        border: none;
        background: none;
        color: var(--mv-accent);
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-size: 22px;
        cursor: pointer;
        opacity: 0.45;
        transition: opacity var(--dur-release) var(--ease-out-soft);
      }

      .rail-nav:hover {
        opacity: 0.9;
        transition-duration: var(--dur-snap);
        transition-timing-function: var(--ease-out-expo);
      }

      .rail-track-wrap {
        flex: 1;
        min-width: 0;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-mask-image: linear-gradient(
          to right,
          transparent 0,
          black 20px,
          black calc(100% - 20px),
          transparent 100%
        );
        mask-image: linear-gradient(to right, transparent 0, black 20px, black calc(100% - 20px), transparent 100%);
        padding: 10px 0 6px;
        scrollbar-width: none;
        transition: opacity var(--dur-snap) var(--ease-out-soft);
      }

      .rail-track-wrap.fading {
        opacity: 0;
      }

      .rail-track-wrap::-webkit-scrollbar {
        display: none;
      }

      .rail-track {
        display: flex;
        align-items: flex-end;
        gap: 18px;
        padding: 0 4px;
        scroll-snap-type: x proximity;
      }

      .tile-wrap {
        position: relative;
        flex: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        scroll-snap-align: center;
      }

      /* Faint color hint behind the tile, from that preset's real hex (see
         getTileTintHex in pdp.js) — helps tell visually-similar metals apart before the
         eye settles on the sphere render itself. Purely a backdrop; the active tile's
         own red selection ring (.tile-wrap.active .tile) is untouched. */
      .tile-wrap::before {
        content: "";
        position: absolute;
        top: -8px;
        left: 50%;
        width: 46px;
        height: 46px;
        transform: translateX(-50%);
        border-radius: 50%;
        background: var(--tile-tint, transparent);
        opacity: 0.3;
        filter: blur(6px);
        z-index: 0;
      }

      .tile-wrap.active::before {
        width: 78px;
        height: 78px;
        opacity: 0.22;
      }

      .tile {
        position: relative;
        z-index: 1;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        overflow: hidden;
        background: var(--mv-paper);
        box-shadow: 0 0 0 1px oklch(0.18 0.01 40 / 0.2);
        opacity: 0.6;
        transform-style: preserve-3d;
        transition: width 320ms var(--ease-overshoot), height 320ms var(--ease-overshoot),
          opacity var(--dur-release) var(--ease-out-soft), box-shadow var(--dur-release) var(--ease-out-soft);
      }

      .tile canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .tile.pending {
        background: linear-gradient(110deg, var(--mv-paper) 10%, oklch(0.7 0.03 60) 30%, var(--mv-paper) 50%);
        background-size: 220% 100%;
        animation: swatch-shimmer 1.7s ease-in-out infinite;
      }

      @keyframes swatch-shimmer {
        0% {
          background-position: 180% 0;
        }
        100% {
          background-position: -80% 0;
        }
      }

      .tile-underline {
        width: 20px;
        height: 1px;
        background: var(--mv-accent);
        opacity: 0;
        transform: scaleX(0.4);
        transition: opacity var(--dur-snap) var(--ease-out-expo), transform 300ms var(--ease-overshoot);
      }

      .tile-label {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--mv-ink);
        opacity: 0.55;
        text-align: center;
        transition: opacity var(--dur-release) var(--ease-out-soft);
      }

      .tile-wrap:hover .tile {
        opacity: 0.85;
        transition-duration: var(--dur-snap);
        transition-timing-function: var(--ease-out-expo);
      }

      .tile-wrap.active .tile {
        width: 130px;
        height: 130px;
        opacity: 1;
        box-shadow: 0 0 0 2px var(--mv-paper), 0 0 0 3px var(--mv-accent);
      }

      .tile-wrap.active:hover .tile {
        opacity: 1;
      }

      .tile-wrap.active .tile-underline {
        opacity: 1;
        transform: scaleX(1);
      }

      .tile-wrap.active .tile-label {
        opacity: 0.9;
      }

      .stage-picker {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 22px;
      }

      .stage-picker-label {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--mv-ink);
        opacity: 0.45;
      }

      .stage-picker-dots {
        display: flex;
        gap: 10px;
      }

      .stage-dot {
        width: 17px;
        height: 17px;
        border-radius: 50%;
        padding: 0;
        cursor: pointer;
        background: var(--dot-color);
        box-shadow: 0 0 0 1px oklch(0.18 0.01 40 / 0.2);
        opacity: 0.75;
        transition: opacity var(--dur-release) var(--ease-out-soft), box-shadow var(--dur-release) var(--ease-out-soft);
      }

      .stage-dot:hover {
        opacity: 0.95;
        transition-duration: var(--dur-snap);
        transition-timing-function: var(--ease-out-expo);
      }

      .stage-dot.active {
        opacity: 1;
        box-shadow: 0 0 0 2px var(--mv-paper), 0 0 0 3px var(--mv-accent);
      }

      /* ---------- Framing: 3D View / On Mannequin / Lens Detail ---------- */

      .mode-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 28px 0 22px;
      }

      .mode-item {
        display: block;
        text-align: left;
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-size: 16px;
        text-decoration: none;
        color: oklch(0.18 0.01 40 / 0.4);
        transition: color var(--dur-release) var(--ease-out-soft), opacity var(--dur-release) var(--ease-out-soft);
      }

      a.mode-item:hover {
        color: oklch(0.18 0.01 40 / 0.65);
        transition-duration: var(--dur-snap);
        transition-timing-function: var(--ease-out-expo);
      }

      .mode-item.is-active {
        color: var(--mv-ink);
      }

      .mode-item.is-active::before {
        content: "— ";
      }

      /* ---------- Angle: fig. i ii iii iv ---------- */

      .angles-row {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
      }

      .angles-label {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.45;
      }

      .angle-btn {
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-size: 15px;
        color: oklch(0.18 0.01 40 / 0.45);
        border-bottom: 1px solid transparent;
        cursor: pointer;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
        padding: 0 0 2px;
        transition: color var(--dur-release) var(--ease-out-soft), border-color var(--dur-release) var(--ease-out-soft);
      }

      .angle-btn:hover {
        color: oklch(0.18 0.01 40 / 0.7);
        transition-duration: var(--dur-snap);
        transition-timing-function: var(--ease-out-expo);
      }

      .angle-btn.is-active {
        color: var(--mv-accent);
        border-bottom-color: var(--mv-accent);
      }

      .summary {
        margin-top: auto;
        padding-top: 32px;
        border-top: 1px solid oklch(0.18 0.01 40 / 0.15);
      }

      .summary-head {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 18px;
      }

      .summary-title {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--mv-ink);
        opacity: 0.5;
      }

      .summary-dash {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        color: var(--mv-ink);
        opacity: 0.5;
      }

      .summary-ref {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--mv-accent);
        opacity: 0.95;
      }

      .summary-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .summary-list li {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 12px 0;
        border-bottom: 1px solid oklch(0.18 0.01 40 / 0.15);
        font-family: "Archivo", sans-serif;
        color: var(--mv-ink);
      }

      .summary-list li:last-child {
        border-bottom: none;
      }

      .summary-list li span:first-child {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        opacity: 0.5;
      }

      .summary-list li span:last-child {
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-size: 14px;
        letter-spacing: 0.02em;
        opacity: 0.92;
      }

      .summary-footnote {
        margin-top: 18px;
        font-family: "Bodoni Moda", serif;
        font-style: italic;
        font-size: 12px;
        color: var(--mv-ink);
        opacity: 0.55;
        text-align: right;
      }

      @media (max-width: 900px) {
        #page {
          grid-template-columns: 1fr;
          grid-template-rows: 62vh auto;
          height: auto;
          min-height: 100vh;
        }

        #stage {
          grid-column: 1;
          grid-row: 1;
          height: 62vh;
        }

        #brand {
          top: 24px;
          left: 24px;
          font-size: 13px;
        }

        #stage .breadcrumb {
          top: 54px;
          left: 24px;
        }

        #controls {
          grid-column: 1;
          grid-row: 2;
          height: auto;
          border-left: none;
          border-top: 1px solid oklch(0.18 0.01 40 / 0.15);
          padding: 36px 24px 32px;
          transform: translateY(16px);
        }

        #controls.panel-visible {
          transform: translateY(0);
        }

        .rail-nav {
          height: 110px;
          width: 22px;
          font-size: 20px;
        }

        .tile {
          width: 50px;
          height: 50px;
        }

        .tile-wrap.active .tile {
          width: 110px;
          height: 110px;
        }
      }

    </style>
  </head>
  <body>
    <div id="page">
      <div id="stage">
        <canvas id="app"></canvas>
        <a id="brand" href="/index.html">Maison Vellora</a>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <aside id="controls">
        <div class="configurator-header">
          <div class="configurator-eyebrow">The Configurator</div>
          <h1 class="configurator-title" id="configurator-title"></h1>
        </div>
      </aside>
    </div>

    <script type="module" src="/src/pdp.js"></script>
  </body>
</html>
